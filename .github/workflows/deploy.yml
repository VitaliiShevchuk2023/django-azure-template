name: Deploy Django to Azure

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Collect static files
      run: python manage.py collectstatic --noinput
      env:
        SECRET_KEY: "build-key"
        DEBUG: "False"
        ALLOWED_HOSTS: "localhost"
        AZURE_CLIENT_ID: "build"
        AZURE_CLIENT_SECRET: "build"
        AZURE_TENANT_ID: "build"
        AZURE_REDIRECT_URI: "http://localhost/"
        BUILDING: "true"   

    # Замість publish-profile — використовуємо Service Principal
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'mydjango1772289446'
        package: .

    - name: Azure Logout
      run: az logout
